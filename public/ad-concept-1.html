<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simpletics - Concept 1: Static Hero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
    .ad { max-width: 1200px; margin: 0 auto; background: white; }
    .hero { position: relative; background: linear-gradient(135deg, #2d5f3a 0%, #1a3a24 100%); color: white; padding: 80px 40px; text-align: center; min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    h1 { font-size: 48px; font-weight: 700; margin-bottom: 20px; line-height: 1.2; }
    .subhead { font-size: 20px; color: rgba(255,255,255,0.9); margin-bottom: 30px; max-width: 600px; }
    .proof { display: flex; gap: 40px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
    .proof-item { text-align: center; }
    .proof-number { font-size: 32px; font-weight: 700; color: #4ade80; }
    .proof-label { font-size: 12px; color: rgba(255,255,255,0.8); text-transform: uppercase; margin-top: 5px; }
    .cta { background: #4ade80; color: #1a3a24; border: none; padding: 16px 40px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: all 0.3s; }
    .cta:hover { background: #22c55e; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(74,222,128,0.3); }
    @media (max-width: 768px) {
      h1 { font-size: 32px; }
      .subhead { font-size: 16px; }
      .hero { padding: 40px 20px; }
    }
  </style>
</head>
<body>
  <div class="ad">
    <div class="hero">
      <h1>Real texture. Zero buildup.</h1>
      <p class="subhead">The sea salt spray that actually holds. No silicone. No BS.</p>
      <div class="proof">
        <div class="proof-item">
          <div class="proof-number">4.8★</div>
          <div class="proof-label">200k+ reviews</div>
        </div>
        <div class="proof-item">
          <div class="proof-number">8+hrs</div>
          <div class="proof-label">Proven hold</div>
        </div>
        <div class="proof-item">
          <div class="proof-number">$20</div>
          <div class="proof-label">Fair priced</div>
        </div>
      </div>
      <button class="cta">Get 30% Off First Order</button>
    </div>
  </div>
</body>
</html>
